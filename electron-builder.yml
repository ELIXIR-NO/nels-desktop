appId: no.nels.desktop
productName: NeLS
copyright: Copyright © 2026 NeLS

directories:
  output: release

# Ad-hoc codesigns the macOS .app after packaging — see scripts/afterPack.js.
# No-op on Windows and Linux.
afterPack: ./scripts/afterPack.js

files:
  - out/**/*
  - package.json
  - node_modules/**/*
  - "!node_modules/.cache"

protocols:
  - name: NeLS Desktop
    schemes:
      - nels

win:
  target: nsis
  icon: build/icon.ico

# build/icon.icns isn't checked in — the macOS runner converts icon.png at
# packaging time using iconutil.
mac:
  target: dmg
  icon: build/icon.png
  category: public.app-category.productivity

linux:
  target: AppImage
  icon: build/icons

nsis:
  oneClick: true
  perMachine: false
  # Both default to true already; being explicit so it's obvious from the
  # config alone that desktop + Start menu shortcuts get created.
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: NeLS

asarUnpack:
  - node_modules/keytar/**

publish:
  provider: github
  releaseType: release
