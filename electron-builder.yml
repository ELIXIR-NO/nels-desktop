appId: no.nels.desktop
productName: NeLS
copyright: Copyright © 2026 NeLS

directories:
  output: release

files:
  - out/**/*
  - package.json
  - node_modules/**/*
  - "!node_modules/.cache"

protocols:
  - name: NeLS Desktop
    schemes:
      - nels

win:
  target: nsis
  icon: build/icon.ico

mac:
  target: dmg
  icon: build/icon.icns
  category: public.app-category.productivity

linux:
  target: AppImage
  icon: build/icons

nsis:
  oneClick: true
  perMachine: false

asarUnpack:
  - node_modules/keytar/**

publish:
  provider: github
  releaseType: release
