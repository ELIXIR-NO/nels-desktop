name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install libsecret (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      # Tag pushes publish installers to a GitHub Release.
      # electron-builder uses GH_TOKEN to create/update the release and
      # reads the target repo from package.json#repository.
      - name: Package and publish (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Fallback: even if GH publishing fails, keep the installers on the
      # run so they can be downloaded manually from the Actions UI.
      - name: Upload artifacts (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.dmg
            release/*.exe
            release/*.zip
            release/*.deb
          if-no-files-found: ignore
