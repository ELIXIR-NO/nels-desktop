name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    # electron-builder needs this to create the GitHub Release on tag pushes
    # (POST /repos/.../releases). Default GITHUB_TOKEN is read-only in many
    # repos, which surfaces as 403 "Resource not accessible by integration".
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install libsecret (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Run tests
        run: npm test

      # Pick build-time env vars based on tag shape.
      # Tags with "-staging." in them get baked against the staging endpoints
      # (matching config.ts defaults). Any other tag build gets production
      # values injected, so bumping package.json to `0.1.X` (no suffix) and
      # tagging `v0.1.X` is all it takes to cut a prod release.
      - name: Configure build target
        shell: bash
        run: |
          REF='${{ github.ref_name }}'
          if [[ '${{ github.ref }}' == refs/tags/v* ]] && [[ "$REF" != *-staging.* ]]; then
            echo "Build target: PRODUCTION (tag $REF)"
            {
              echo 'VITE_API_BASE=https://nels.elixir.no/nels-api2'
              echo 'VITE_OAUTH_BASE=https://nels.elixir.no/oauth2'
              echo 'VITE_SSH_LOGIN_HOST=login.nels.elixir.no'
              echo 'VITE_SSH_DATA_HOST=data.nels.elixir.no'
              echo 'VITE_SSH_LOGIN_FP=D88VKPfCDylk3J83XGSIRrGk6UyLwx4nC85ljmjhFCY'
              echo 'VITE_SSH_DATA_FP=jtIIVCQPOXFvOkUIaTrfwYroV/3mEZ6PL7/tMMphO4o'
            } >> "$GITHUB_ENV"
          else
            echo "Build target: STAGING (ref $REF)"
          fi

      - name: Build
        run: npm run build

      # Tag pushes publish installers to a GitHub Release.
      # electron-builder uses GH_TOKEN to create/update the release and
      # reads the target repo from package.json#repository.
      - name: Package and publish (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Fallback: even if GH publishing fails, keep the installers on the
      # run so they can be downloaded manually from the Actions UI.
      - name: Upload artifacts (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.dmg
            release/*.exe
            release/*.zip
            release/*.deb
          if-no-files-found: ignore

      # electron-builder creates the release as non-prerelease by default,
      # which means GitHub's /releases/latest endpoint would return staging
      # builds — breaking the install one-liner for everyone who isn't
      # opting into NELS_STAGING=1. Flip the flag for -staging.* tags.
      # Runs once per matrix leg; subsequent calls are idempotent.
      - name: Mark staging release as prerelease
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-staging.')
        shell: bash
        run: gh release edit "${{ github.ref_name }}" --prerelease --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
